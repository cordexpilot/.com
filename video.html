<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CordexPilot Video</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:#222;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#f4f1ea;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.logo-area{
display:flex;
align-items:center;
}

.logo{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
}

.brand{
font-size:22px;
font-weight:bold;
}

/* VIDEO AREA */

.container{
width:80%;
margin:auto;
margin-top:40px;
flex:1;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

/* BUTTONS */

.buttons{
margin-top:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.subscribe{
background:red;
color:white;
}

.like{
background:#eee;
}

.share{
background:#0077ff;
color:white;
}

/* COMMENTS */

.comments{
margin-top:40px;
}

.comments input{
width:70%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.comments button{
background:red;
color:white;
}

.comment{
background:#f5f5f5;
padding:8px;
margin-top:10px;
border-radius:5px;
}

/* FOOTER */

footer{
text-align:center;
padding:18px;
background:#f4f1ea;
}

</style>
</head>

<body>

<header>

<div class="logo-area">
<img src="images/logo.png" class="logo">
<div class="brand">CordexPilot</div>
</div>

</header>


<div class="container">

<iframe id="player" allowfullscreen></iframe>

<div class="buttons">

<button class="subscribe" onclick="subscribe()">Subscribe</button>

<button class="like" onclick="like()">❤️ Like</button>

<button class="share" onclick="share()">Share</button>

</div>


<div class="comments">

<h3>Comments</h3>

<input id="commentInput" placeholder="Write comment">

<button onclick="postComment()">Post</button>

<div id="commentList"></div>

</div>

</div>


<footer>
© 2026 CordexPilot Platform
</footer>


<script>

/* VIDEO LOAD */

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id


/* SUBSCRIBE */

function subscribe(){

alert("Subscribed 🔔")

}

/* LIKE */

function like(){

alert("Liked ❤️")

}

/* SHARE */

function share(){

navigator.clipboard.writeText(window.location.href)

alert("Video link copied")

}

/* COMMENTS */

function postComment(){

let input=document.getElementById("commentInput")

let text=input.value

if(text==="") return

let div=document.createElement("div")

div.className="comment"

div.innerText=text

document.getElementById("commentList").appendChild(div)

input.value=""

}

</script>

</body>
</html>
